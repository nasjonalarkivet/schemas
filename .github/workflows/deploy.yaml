name: deploy

on:
  pull_request:
    branches:
      - master
    types: [closed]

env:
  ACR: arkivverketpublic.azurecr.io/schemas
  IMAGE: schemas

jobs:
  pre_job:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
    steps:
      - name: Get current date
        id: date
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

  build-and-publish-image:
    runs-on: ubuntu-latest
    needs: pre_job
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE_VERSION: ${{ format('{0}-{1}', needs.pre_job.outputs.date, github.sha) }}
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Azure (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name arkivverketpublic

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
        with:
          install: true

      - name: Publish
        run: >
          docker build
          --tag ${{ env.ACR }}/${{ env.IMAGE }}:${{ env.IMAGE_VERSION }}
          --tag ${{ env.ACR }}/${{ env.IMAGE }}:latest
          --push .
        working-directory: .
