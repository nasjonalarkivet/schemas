name: CI 

on:
  push:
    branches-ignore:
      - master

jobs:
  build-image:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.12.0
        with:
          install: true

      - name: Build Docker Image
        run: >
          docker build
          --tag ${{ format('schemas-{0}', github.sha) }}
          --load .
